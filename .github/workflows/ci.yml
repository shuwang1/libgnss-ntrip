name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Swift
      uses: SwiftyLab/setup-swift@v1
      with:
        swift-version: "6.3"
        
    - name: Build
      run: swift build -v
      
    - name: Run tests
      run: swift test --enable-test-discovery --enable-code-coverage
 # 2. Convert Swift's internal LLVM coverage data into standard lcov format
    - name: Convert Coverage to LCOV
      uses: maxep/spm-lcov-action@0.3.0
      with:
        output-file: ./coverage/lcov.info
      
    - name: Upload
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_SHUWANG1_LIBGNSS_NTRIP_TOKEN }}
